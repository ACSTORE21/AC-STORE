G.sort((a,b)=>{
  const c=s=>s.replace(/^(a |the |an )/i,'').trim().toLowerCase();
  return c(a.n).localeCompare(c(b.n));
});

const TM={PC:['tpc','PC'],Ul:['tul','ULTIMATE'],Es:['tes','ESSENTIAL'],Pr:['tpr','PREMIUM']};
const tt=c=>{const[cls,l]=TM[c]||['',''];if(!cls)return'';return`<span class="tt ${cls}">${l}</span>`;};

let cf='all',cs='';
function filt(){
  let g=G;
  if(cf==='pc') g=g.filter(x=>x.t.includes('PC'));
  else if(cf==='ess') g=g.filter(x=>x.t.includes('Es'));
  else if(cf==='d1') g=g.filter(x=>x.d);
  if(cs){const q=cs.toLowerCase();g=g.filter(x=>x.n.toLowerCase().includes(q));}
  return g;
}
function render(){
  const g=filt();
  const gl=document.getElementById('gl');
  const nr=document.getElementById('nr');
  document.getElementById('st').textContent=g.length+' GAMES';
  if(!g.length){gl.innerHTML='';nr.classList.add('show');return;}
  nr.classList.remove('show');
  gl.innerHTML=g.map((x,i)=>`<div class="gi"><div class="gn">${String(i+1).padStart(3,'0')}</div><div class="info"><div class="nm">${x.n}${x.d?'<span class="d1b">★DAY1</span>':''}</div><div class="tr">${x.t.map(tt).join('')}</div></div></div>`).join('');
}
function buildAJ(){
  const c=document.getElementById('aj');
  ['#',...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'].forEach(l=>{
    const b=document.createElement('button');
    b.className='ab hg';b.textContent=l;
    b.onclick=()=>{
      for(const item of document.querySelectorAll('.gi')){
        const raw=item.querySelector('.nm').textContent.replace('★DAY1','').trim();
        const s=raw.replace(/^(a |the |an )/i,'').trim();
        const f=s[0].toUpperCase();
        if((l==='#'&&/[0-9]/.test(f))||f===l){item.scrollIntoView({behavior:'smooth',block:'start'});break;}
      }
    };
    c.appendChild(b);
  });
}
document.getElementById('si').addEventListener('input',e=>{cs=e.target.value;render();});
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cf=b.dataset.f;render();
}));
buildAJ();render();
</script>
